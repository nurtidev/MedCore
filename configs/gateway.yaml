server:
  http_port: 8080
  read_timeout: 60s
  write_timeout: 60s

upstream:
  auth:        "http://auth-service:8081"
  billing:     "http://billing-service:8082"
  integration: "http://integration-service:8083"
  analytics:   "http://analytics-service:8084"
  timeouts:
    default:   "30s"
    analytics: "5s"

auth_grpc:
  addr: "auth-service:9091"
  timeout: "5s"

rate_limit:
  global_rpm:    1000
  login_rpm:     10
  analytics_rpm: 60

cors:
  allowed_origins: ["https://app.medcore.kz", "http://localhost", "http://localhost:3000", "http://localhost:5173"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]

redis:
  addr: "${REDIS_ADDR:redis:6379}"
  password: ""
  db: 0

log:
  level: "info"
  format: "json"
