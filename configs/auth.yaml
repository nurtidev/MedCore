server:
  http_port: 8081
  grpc_port: 9091
  read_timeout: 30s
  write_timeout: 30s

database:
  dsn: "${DATABASE_URL}"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: "${REDIS_ADDR}"

jwt:
  secret: "${JWT_SECRET}"
  access_ttl: "15m"
  refresh_ttl: "168h"   # 7 days

encryption:
  iin_key: "${IIN_ENCRYPTION_KEY}"   # 32-byte hex string

log:
  level: "info"
  format: "json"
