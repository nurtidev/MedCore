server:
  http_port: 8084
  grpc_port: 9094
  read_timeout: "30s"
  write_timeout: "30s"

clickhouse:
  dsn: "${CLICKHOUSE_DSN}"
  max_open_conns: 10
  dial_timeout: "10s"

redis:
  addr: "${REDIS_ADDR}"
  password: ""
  db: 0

kafka:
  brokers: "${KAFKA_BROKERS}"
  group_id: "analytics-service"
  topics:
    - "payment.completed"
    - "payment.failed"
    - "integration.appointment.created"
    - "integration.lab_result.received"
    - "user.login"

consumer:
  batch_size: 100
  flush_interval: "5s"

auth_grpc:
  addr: "${AUTH_GRPC_ADDR:auth-service:9091}"

jwt:
  secret: "${JWT_SECRET}"

log:
  level: "info"
  format: "json"
